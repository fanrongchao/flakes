- id: L-20260331-002
  kind: prior
  scope: host
  trigger: changing sudo policy on a nix-darwin host
  decision: use nix-darwin's sudo extraConfig path and preflight with a build before switch
  rule: set security.sudo.extraConfig, run darwin-rebuild build first, then darwin-rebuild switch, and verify with sudo -n
  evidence:
    - nix-darwin evaluation rejected security.sudo.extraRules on m5-air
    - security.sudo.extraConfig built successfully and enabled passwordless sudo after switch
  risk: high
  auto_apply: true
  confidence: high
  ask_when:
    - user wants narrower sudo scope than NOPASSWD ALL
    - host is not managed by nix-darwin
  fallback: keep passworded sudo and only automate the needed privileged commands
  promotion: adopted
  added_at: "2026-03-31"
  last_validated_at: "2026-03-31"

- id: L-20260406-001
  kind: candidate
  scope: zero-trust
  trigger: replacing or introducing a DERP relay on a host that already runs Headscale behind repo-managed HAProxy and Caddy
  decision: prefer Headscale embedded DERP with a dedicated hostname and Caddy vhost, and advertise it via the custom derp map path instead of standing up a separate DERP daemon
  rule: enable services.headscale.settings.derp.server, keep automatically_add_embedded_derp_region disabled, add a dedicated reverse-proxied DERP hostname, and verify UDP 3478 forwarding outside the host separately
  evidence:
    - ai-server switched successfully with embedded DERP enabled
    - derp.zhsjf.cn returned HTTP 426 through local Caddy after the switch
    - tailscale debug derp 902 successfully connected to the custom region
  risk: high
  auto_apply: false
  confidence: medium
  ask_when:
    - the host does not already terminate TLS through repo-managed ingress
    - a dedicated standalone DERP service is required for operational separation
  fallback: deploy a standalone DERP service with its own ingress path and keep the headscale derp map externalized
  promotion: candidate
  added_at: "2026-04-06"
  last_validated_at: "2026-04-06"

- id: L-20260406-002
  kind: prior
  scope: host
  trigger: a Linux host runs Headscale embedded DERP/STUN and Mihomo TUN with auto-route enabled
  decision: bypass Mihomo at the host policy-routing layer for the headscale service user instead of trying to express the fix only in Mihomo YAML
  rule: add a persistent ip rule for the headscale uidrange to lookup main before Mihomo's catch-all TUN rules, and verify with tailscale debug derp plus netcheck
  evidence:
    - tcpdump showed STUN replies leaving ai-server as 198.18.0.1 before the bypass
    - a oneshot systemd service installing uidrange 995-995 lookup main restored IPv4 STUN responses for derp.zhsjf.cn
    - tailscale netcheck switched nearest DERP to cn-ai-server after the route bypass was deployed
  risk: high
  auto_apply: true
  confidence: high
  ask_when:
    - the host does not run Mihomo TUN or equivalent policy-routing capture
    - Headscale is not serving embedded DERP/STUN on the same host
    - the service user is intentionally isolated and should not bypass the proxy uplink
  fallback: disable Mihomo TUN on the host or move DERP/STUN to a separate machine that does not route through Mihomo
  promotion: adopted
  added_at: "2026-04-06"
  last_validated_at: "2026-04-06"

- id: L-20260406-003
  kind: prior
  scope: profiles
  trigger: a shared zero-trust, ingress, or proxy profile starts accumulating deployment-specific domains, public IPs, SNI host lists, upstreams, or proxy-group names
  decision: move those site-owned values into host modules or explicit CLI/script parameters and keep the shared profile generic
  rule: define module options or script/env parameters for control-plane URLs, tailnet domains, DERP hostname/IP, ingress virtual hosts, HAProxy SNI host lists, manual proxy-group names, and custom rules; keep shared profiles free of site-specific constants
  evidence:
    - ai-server continued to evaluate after hs.zhsjf.cn, derp.zhsjf.cn, 218.11.1.14, jp-vultr, and BosLife were moved out of shared profiles and into host-owned config
    - shared ingress and egress profiles became reusable without embedding one deployment's DNS and proxy naming scheme
  risk: medium
  auto_apply: true
  confidence: high
  ask_when:
    - the value is intentionally identical across every deployment site
    - the value only exists in a single host module and is not shared
  fallback: keep the value in the single host module and document why it is site-owned
  promotion: adopted
  added_at: "2026-04-06"
  last_validated_at: "2026-04-06"

- id: L-20260406-005
  kind: prior
  scope: hosts
  trigger: a host owns Headscale, embedded DERP, ingress hostnames, and Mihomo egress settings whose DNS names or public IPs may migrate later
  decision: define the site-owned Headscale/tailnet/DERP values once in the host module and fan them out into zero-trust, ingress, HAProxy SNI, and Mihomo egress options while leaving the DERP/STUN route-bypass service in the shared control-plane profile
  rule: use one host-owned parameter block for headscale hostname, tailnet base domain, DERP hostname, and DERP IPv4; derive ingress virtualHosts, HAProxy tlsServerNames, and Mihomo tailscale/direct/route-exclude settings from that block; do not move `headscale-derp-route-bypass` out of the shared profile that owns Headscale
  evidence:
    - ai-server derives zeroTrustControlPlane, networkIngressProxy, ingressHaproxySni, and mihomoEgress values from one site definition instead of repeating derp/headscale domains across the host file
    - zero-trust-control-plane.nix still owns the headscale-derp-route-bypass oneshot that keeps STUN replies off Mihomo TUN
  risk: high
  auto_apply: true
  confidence: high
  ask_when:
    - the host does not run Headscale/DERP locally
    - ingress and egress values intentionally come from different operators or different domains
  fallback: keep the site values in the host module even if a single helper block is not worth introducing yet; never fold the route-bypass fix into unrelated egress logic
  promotion: adopted
  added_at: "2026-04-06"
  last_validated_at: "2026-04-06"

- id: L-20260406-006
  kind: heuristic
  scope: desktop-tooling
  trigger: a Mihomo/Clash Verge workflow needs to run on both macOS and Windows, including future Codex sessions on Windows without Nix
  decision: keep refresh/runtime logic inside the CLI binary and treat platform differences as path detection, system proxy introspection, and controller transport concerns
  rule: prefer native CLI subcommands such as refresh, doctor, and runtime over shell wrappers; on Windows, use native config/cache roots, `%APPDATA%`/`%LOCALAPPDATA%` Clash Verge discovery, and WinINET proxy inspection instead of assuming Unix shell/Nix behavior
  evidence:
    - mihomo-cli already absorbed refresh-clash-verge and runtime operations that used to live in wrappers
    - preparing for Windows only required adding platform-native path and proxy detection, not a second control plane
  risk: medium
  auto_apply: true
  confidence: medium
  ask_when:
    - the workflow truly depends on a platform-specific GUI API that the CLI cannot reach
    - a native package/distribution format is required and the binary itself is not yet shipped
  fallback: keep the platform-specific wrapper thin and make it call the CLI, rather than re-implementing logic in scripts
  promotion: candidate
  added_at: "2026-04-06"
  last_validated_at: "2026-04-06"

- id: L-20260407-001
  kind: candidate
  scope: ingress
  trigger: a tailnet-only Mihomo controller needs a browser UI without exposing the raw controller port/secret to a third-party dashboard origin
  decision: self-host static dashboard assets on the managed host, bind the Mihomo controller to localhost only, and expose a same-origin `/api` reverse proxy behind the tailnet TLS vhost
  rule: package the dashboard assets in Nix, serve them from the host's tailnet-only `443` virtual host, proxy `/api` to `127.0.0.1:<controller-port>` with the secret injected server-side, and keep the public ingress path rejecting that hostname
  evidence:
    - ai-server now binds mihomo.zhsjf.cn only on the tailnet address while the controller listener is limited to 127.0.0.1:9090
    - same-origin checks against /api/version and /zashboard/ returned success over 100.64.0.3:443
    - forcing mihomo.zhsjf.cn to the public IP 218.11.1.14:443 failed, preserving tailnet-only access
  risk: medium
  auto_apply: false
  confidence: medium
  ask_when:
    - the UI must also be reachable from the public Internet

- id: L-20260407-003
  kind: candidate
  scope: ingress
  trigger: an HTTPS application on ai-server should be reachable only through Tailscale while sharing the existing public and tailnet HAProxy/Caddy stack
  decision: bind the app's Caddy vhost to the tailnet IP and add the hostname to the tailnet-only SNI allow-list so the public passthrough frontend rejects it
  rule: for tailnet-only HTTPS apps on ai-server, expose the service only on the tailnet address and register its hostname in services.ingressHaproxySni.tailnetTlsServerNames
  evidence:
    - ai-server now binds airs.zhsjf.cn on the tailnet address while the public HAProxy frontend rejects the same SNI on 218.11.1.14:443
    - the same ingress pattern already backs the tailnet-only Mihomo dashboard hostname
  risk: medium
  auto_apply: false
  confidence: medium
  ask_when:
    - the hostname must remain reachable from the public Internet

- id: L-20260407-004
  kind: candidate
  scope: dns
  trigger: a wildcard public DNS record exists and a single child hostname needs to become tailnet-only or be retired
  decision: override the child hostname explicitly instead of relying on the wildcard to change behavior
  rule: when a wildcard public A record is present, add a specific record for tailnet-only or retired hostnames so the wildcard no longer resolves them to the public ingress IP
  evidence:
    - zhsjf.cn keeps a wildcard A record pointing to 218.11.1.14
    - airs.zhsjf.cn and aiapi.zhsjf.cn kept resolving publicly until explicit child records were added
  risk: medium
  auto_apply: false
  confidence: medium
  ask_when:
    - removing the wildcard itself would affect unrelated hostnames

- id: L-20260407-005
  kind: candidate
  scope: ops
  trigger: a managed NixOS host deploys from a git checkout such as ~/flakes
  decision: keep the remote checkout clean and update it only by fast-forwarding committed changes from the canonical local repo
  rule: never depend on remote dirty worktrees or host-only edits for durable infra state; commit locally, push, then use git fetch plus git merge --ff-only before nixos-rebuild
  evidence:
    - ai-server rollouts became easier to verify once local HEAD, remote HEAD, and deployed generation all referred to the same committed state
    - remote cleanup removed ambiguity about whether behavior came from the repo, an uncommitted host patch, or a forgotten stash
  risk: low
  auto_apply: true
  confidence: high
  ask_when:
    - an emergency hotfix cannot wait for the normal local commit-and-push flow
  promotion: candidate
  added_at: "2026-04-07"
  last_validated_at: "2026-04-07"

- id: L-20260408-001
  kind: candidate
  scope: containers
  trigger: a containerized service on NixOS uses bind-mounted state and the image drops from root to an internal service user
  decision: ensure the prepare phase assigns host-side ownership that matches the in-container runtime uid/gid before starting the container
  rule: do not assume a root-owned bind mount is safe just because the container launches as root; if the actual service process runs as an internal user, chown the host directory to that uid/gid in the managed prepare step
  evidence:
    - AIRS Redis failed to save RDB files while /var/lib/ai-relay-services/redis was root:root
    - changing the directory to uid 999 gid 1000 restored Redis persistence and allowed AIRS to refresh admin credentials successfully
  risk: medium
  auto_apply: false
  confidence: high
  ask_when:
    - the image is known to keep the service process running as root
  promotion: candidate
  added_at: "2026-04-08"
  last_validated_at: "2026-04-08"

- id: L-20260407-002
  kind: candidate
  scope: package
  trigger: a self-hosted Mihomo dashboard still shows stale setup state or old backend URLs after moving to a same-origin `/api` reverse proxy
  decision: patch the packaged dashboard assets to seed their local controller state for the managed `/api` endpoint and disable stale service workers that could serve older frontend code
  rule: when packaging dashboard assets for same-origin use, inject startup scripts that overwrite the dashboard's persisted backend settings with `window.location.origin + "/api"` and replace service worker registration scripts with unregister-only shims
  evidence:
    - metacubexd needed injected `endpointList` and `selectedEndpoint` localStorage state to stop preferring an old `127.0.0.1` backend
    - yacd needed injected `localStorage["yacd.metacubex.one"]` state to override previously persisted clash API configs
    - unregister-only `registerSW.js` and self-unregistering `sw.js` stopped stale dashboard caches from surviving the migration
  risk: medium
  auto_apply: false
  confidence: medium
  ask_when:
    - the dashboard is intentionally expected to remember user-managed remote backends instead of a single managed same-origin backend
    - offline/PWA behavior is a product requirement and service workers must stay enabled
  fallback: document a one-time manual cache clear for operators, but keep the reverse-proxied controller private and same-origin
  promotion: candidate
  added_at: "2026-04-07"
  last_validated_at: "2026-04-07"
