- id: L-20260226-001
  kind: prior
  scope: host
  trigger: execute system switch on NixOS host
  decision: default to sudo for nixos-rebuild switch activation
  rule: sudo nixos-rebuild switch --flake /home/frc/flakes#$(hostname)
  evidence:
